<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>拝見 v2 — 茶碗を、手のひらに</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/digital-haiken/assets/index-Cx14Ptub.js"></script>
  <link rel="stylesheet" crossorigin href="/digital-haiken/assets/index-C0YLI8ps.css">
</head>
<body>
  <div id="scene"></div>

  <div id="mei">
    <div class="name" id="meiName">黒樂</div>
    <div class="kind" id="meiKind">くろらく ・ 黒楽茶碗</div>
  </div>

  <div id="shelf"></div>

  <div id="dock">
    <button id="haikenBtn">拝見をはじめる（カメラ）</button>
    <div id="hint">ドラッグで全方向に回す ・ ホイールで寄る</div>
  </div>

  <div id="camWrap">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="camTag">手をかざしてください</div>
  </div>

  <div id="intro">
    <h1>拝見</h1>
    <p>てのひらに、ひとつの茶碗を</p>
    <button id="enter">入　る</button>
  </div>

  <!-- カメラ拝見の説明ポップアップ（ピクトグラム） -->
  <div id="guide" class="hide">
    <div class="guide-card">
      <div class="guide-head">
        <span class="guide-kana">かめら はいけん</span>
        <h2>手で、拝見する</h2>
        <p>画面にかざした手で、茶碗を回して愛でます。</p>
      </div>
      <ul class="guide-list">
        <li>
          <span class="pg" aria-hidden="true"><svg viewBox="0 0 38 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <g transform="translate(0,1) scale(0.82)"><path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></g>
            <g transform="translate(23,3.5) scale(0.52)"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></g>
          </svg></span>
          <div class="tx"><b>手のひらで回す</b><i>左右に動かして全周を拝見</i></div>
        </li>
        <li>
          <span class="pg" aria-hidden="true"><svg viewBox="0 0 38 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <g transform="translate(0,1) scale(0.82)"><path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/><path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></g>
            <g transform="translate(25,2.5) scale(0.52)"><path d="M8 6L12 2L16 6"/><path d="M12 2V22"/></g>
          </svg></span>
          <div class="tx"><b>手を上げて傾ける</b><i>口づけるように、前へ</i></div>
        </li>
        <li>
          <span class="pg" aria-hidden="true"><svg viewBox="0 0 38 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <g transform="translate(0,1) scale(0.82)"><path d="M18 11.5V9a2 2 0 0 0-2-2a2 2 0 0 0-2 2v1.4"/><path d="M14 10V8a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"/><path d="M10 9.9V9a2 2 0 0 0-2-2a2 2 0 0 0-2 2v5"/><path d="M6 14a2 2 0 0 0-2-2a2 2 0 0 0-2 2"/><path d="M18 11a2 2 0 1 1 4 0v3a8 8 0 0 1-8 8h-4a8 8 0 0 1-8-8 2 2 0 1 1 4 0"/></g>
            <g transform="translate(23,3.5) scale(0.5)"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></g>
          </svg></span>
          <div class="tx"><b>つまんで裏返す</b><i>指をつまむと、高台（裏）へ</i></div>
        </li>
      </ul>
      <button id="guideStart">カメラを許可して始める</button>
      <button id="guideClose" class="ghost">とじる</button>
    </div>
  </div>

</body>
</html>
